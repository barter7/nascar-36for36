name: Update Race Results

on:
  workflow_dispatch:
  schedule:
    # Run every Tuesday at 10am ET (14:00 UTC) — after Monday data refresh
    - cron: "0 14 * * 2"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-nascar-update-${{ hashFiles('.github/workflows/update-results.yml') }}
          restore-keys: ${{ runner.os }}-r-nascar-update-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("dplyr", "readr", "stringr", "nascaR.data"))
        shell: Rscript {0}

      - name: Run results updater
        run: Rscript update_results.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update race results $(date +%Y-%m-%d)"
            git push
          fi
