name: Deploy NASCAR 36 for 36

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app.R"
      - "update_results.R"
      - "data/**"

concurrency:
  group: nascar-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-nascar-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: ${{ runner.os }}-r-nascar-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        run: |
          install.packages(c(
            "shiny", "bslib",
            "dplyr", "tidyr", "ggplot2", "readr", "stringr",
            "googlesheets4", "rsconnect"
          ))
        shell: Rscript {0}

      - name: Cache driver images
        run: Rscript cache_images.R

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )

          rsconnect::deployApp(
            appDir         = ".",
            appName        = "nascar36for36",
            appFiles       = c(
              "app.R",
              list.files("data", full.names = TRUE),
              if (dir.exists("www")) list.files("www", full.names = TRUE, recursive = TRUE) else character(0)
            ),
            forceUpdate    = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
